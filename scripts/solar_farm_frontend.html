<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Solar Farm Inspector</title>
<style>
body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: Arial, sans-serif;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.container {
  display: flex;
  flex-direction: row;
  gap: 20px;
  width: 95%;
  justify-content: space-between;
  align-items: flex-start;
}
.left-panel {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-left: 40px;
}
.btn {
  padding: 20px 50px;
  font-size: 20px;
  color: #fff;
  background: #333;
  border: 2px solid #555;
  border-radius: 12px;
  cursor: pointer;
  width: 260px;
  text-align: center;
  transition: all 0.3s;
}
.btn:not(:disabled):hover { background: #555; transform: scale(1.05); }
.btn:disabled { background: #666; cursor: not-allowed; opacity: 0.4; }
.btn-start { border-color: #4CAF50; }
.btn-stop { border-color: #f44336; }
.btn-kill { border-color: #ff5722; background: #4a1a1a; }
.btn-kill:not(:disabled):hover { background: #7a2020; }
.center-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 15px;
  align-items: center;
}
.report-box {
  background: #252540;
  border: 2px solid #444;
  border-radius: 12px;
  padding: 15px;
  width: 100%;
  max-width: 500px;
  height: 300px;
  overflow-y: auto;
  font-size: 14px;
  white-space: pre-wrap;
}
.map-box {
  background: #252540;
  border: 2px solid #444;
  border-radius: 12px;
  padding: 10px;
  width: 100%;
  max-width: 500px;
  height: 400px;
  position: relative;
}
.map-box canvas {
  width: 100%;
  height: 100%;
}
.right-panel {
  display: flex;
  flex-direction: column;
  gap: 15px;
  margin-right: 40px;
}
.solar-img {
  max-width: 400px;
  border-radius: 12px;
  border: 3px solid #444;
}
.status {
  padding: 10px;
  font-size: 16px;
  font-weight: bold;
  text-align: center;
  border-radius: 8px;
  background: #333;
}
.signature {
  position: fixed;
  bottom: 10px;
  left: 10px;
  font-size: 13px;
  color: #666;
}
</style>
</head>
<body>
<div class="container">
  <div class="left-panel">
    <button class="btn btn-start" id="startBtn">СТАРТ МИССИИ</button>
    <button class="btn btn-stop" id="stopBtn" disabled>СТОП (ПОСАДКА)</button>
    <button class="btn btn-kill" id="killBtn">KILL SWITCH</button>
    <div class="status" id="statusBox">Ожидание...</div>
  </div>

  <div class="center-panel">
    <h3>Отчёт инспекции</h3>
    <div class="report-box" id="reportBox">Миссия не запущена</div>
    <h3>2D-карта солнечной фермы</h3>
    <div class="map-box">
      <canvas id="mapCanvas" width="500" height="400"></canvas>
    </div>
  </div>

  <div class="right-panel">
    <h3>Изображение /solar</h3>
    <img class="solar-img" id="solarImg" src="" alt="Ожидание данных..." />
  </div>
</div>
<div class="signature">Solar Farm Inspector — НТО Летающая робототехника</div>

<script>
const startBtn = document.getElementById('startBtn');
const stopBtn = document.getElementById('stopBtn');
const killBtn = document.getElementById('killBtn');
const statusBox = document.getElementById('statusBox');
const reportBox = document.getElementById('reportBox');
const mapCanvas = document.getElementById('mapCanvas');
const solarImg = document.getElementById('solarImg');
const ctx = mapCanvas.getContext('2d');

let panels = [];
let rosConnected = false;
let ws = null;

// ROS Bridge подключение
function connectROS() {
  ws = new WebSocket('ws://localhost:9090');
  ws.onopen = () => {
    rosConnected = true;
    statusBox.textContent = 'ROS подключен';
    statusBox.style.background = '#2a4a2a';

    // Подписка на топики
    ws.send(JSON.stringify({op:'subscribe', topic:'/buildings', type:'std_msgs/String'}));
    ws.send(JSON.stringify({op:'subscribe', topic:'/mission/status', type:'std_msgs/String'}));
  };
  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);
    if (msg.topic === '/buildings') {
      reportBox.textContent = msg.msg.data;
    }
    if (msg.topic === '/mission/status') {
      const st = msg.msg.data;
      statusBox.textContent = st;
      if (st === 'STARTING' || st === 'FLYING') {
        startBtn.disabled = true;
        stopBtn.disabled = false;
      } else if (st === 'COMPLETED') {
        startBtn.disabled = false;
        stopBtn.disabled = true;
      }
    }
  };
  ws.onclose = () => {
    rosConnected = false;
    statusBox.textContent = 'ROS отключен';
    statusBox.style.background = '#4a2a2a';
    setTimeout(connectROS, 2000);
  };
  ws.onerror = () => { ws.close(); };
}
connectROS();

function publishEmpty(topic) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({op:'publish', topic, msg:{}}));
  }
}

startBtn.onclick = () => publishEmpty('/mission/start');
stopBtn.onclick = () => publishEmpty('/mission/land');
killBtn.onclick = () => publishEmpty('/mission/kill');

// Обновление изображения /solar
function updateSolarImg() {
  solarImg.src = `/solar_image?t=${Date.now()}`;
  // Если rosbridge, пытаемся через compressed image topic
}
setInterval(updateSolarImg, 500);

// Отрисовка карты
function drawMap() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, 500, 400);

  // Координатная сетка (aruco_map 0-9)
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 0.5;
  const scale = 45; // пикселей на метр
  const ox = 25, oy = 370;

  for (let i = 0; i <= 9; i++) {
    ctx.beginPath();
    ctx.moveTo(ox + i * scale, oy - 9 * scale);
    ctx.lineTo(ox + i * scale, oy);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ox, oy - i * scale);
    ctx.lineTo(ox + 9 * scale, oy - i * scale);
    ctx.stroke();
  }

  // Начало координат
  ctx.fillStyle = '#888';
  ctx.fillRect(ox - 3, oy - 3, 6, 6);
  ctx.fillText('(0,0)', ox - 15, oy + 15);

  // Панели
  for (const p of panels) {
    const px = ox + p.x * scale;
    const py = oy - p.y * scale;
    const colors = {'нормальное состояние':'#FFD700','некритический перегрев':'#FF8C00','срочный ремонт':'#FF0000','не определено':'#888'};
    ctx.fillStyle = colors[p.heat] || '#888';
    ctx.fillRect(px - 15, py - 9, 30, 18);
    ctx.fillStyle = '#fff';
    ctx.font = '11px Arial';
    ctx.fillText(`#${p.index}`, px - 10, py + 4);
  }
}

// Обновление карты каждые 500мс
setInterval(drawMap, 500);

// Демо-режим (если ROS не подключился через 5с)
setTimeout(() => {
  if (!rosConnected) {
    reportBox.textContent = 'Демо-режим: ROS Bridge не подключен';
    panels = [
      {index:1, x:2.5, y:1.5, heat:'нормальное состояние', contamination:3},
      {index:2, x:5.0, y:3.0, heat:'некритический перегрев', contamination:4},
      {index:3, x:7.5, y:2.0, heat:'срочный ремонт', contamination:5},
      {index:4, x:3.0, y:5.5, heat:'нормальное состояние', contamination:2},
      {index:5, x:6.0, y:7.0, heat:'некритический перегрев', contamination:3},
    ];
    let demoReport = panels.map(p =>
      `Солнечная панель №${p.index}: ${p.x.toFixed(1)} ${p.y.toFixed(1)}, ${p.heat}, ${p.contamination}`
    ).join('\n');
    reportBox.textContent = demoReport;
    drawMap();
  }
}, 5000);
</script>
</body>
</html>
